<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Eventos DOM</title>
    <style>
        body {
            font: normal 16pt Arial;
        }
        div {
            background-color: darkgreen;
            color: white;
            width: 200px;
            height: 200px;
            line-height: 200px;
            text-align: center;
            margin: 40px;
        }
    </style>
</head>
<body>
    <h1>Aula - 10</h1>
    <hr>
    <h2>Eventos DOM</h2>
    <p></p>
    <div  id="area">
        Interaja...
    </div>
    <script>
        const area = document.querySelector('#area')
        area.addEventListener('click', clicou);
        area.addEventListener('mouseenter', entrou);
        area.addEventListener('mouseleave', saiu);
        function clicou() {
            area.innerHTML = 'Clicou...'
            area.style.background = 'lightblue'
        }
        function entrou() {
            area.innerHTML = 'Entrou...'
            area.style.background = 'lightgreen'
        }
        function saiu() {
            area.innerHTML = 'Saiu...'
            area.style.background = 'darkblue'
        }
    </script>
</body>
</html>
