<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Eventos DOM</title>
    <style>
        body {
            font: normal 16pt Arial;
        }
        div#area {
            background-color: darkgreen;
            color: white;
            width: 200px;
            height: 200px;
            line-height: 200px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Aula - 10</h1>
    <hr>
    <h2>Eventos DOM</h2>
    <p></p>
    <div  id="area">
        Interaja...
    </div>
    <script>
        const area = document.getElementById('div#area');
        area.addEventListener('click', clicou);
        function clicou() {
            area.innerText = 'Clicou...';
        }
    </script>
</body>
</html>
