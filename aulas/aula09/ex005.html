<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus primeiros passos com DOM</title>
    <style>
        body {
            background-color: darkslateblue;
            font: normal 16pt Arial;
            color: white;
        }
        abbr {

        }

</head>
<body>

    <script>
        document.querySelector('div.msg').style.background = 'green'
    </script>
