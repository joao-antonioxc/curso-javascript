<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Primeira Aula de Javascript</title>
    <style>
        body {
            background-color: darkgray;
            color: white;
            font: normal 16pt Arial;
        }
        h1 {
            color: yellow;
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1>
    <hr>
    <p>
        Já me livrei da maldição!!!
    </p>
    <script>
        var n1 = Number.parseInt(window.prompt('Digite um número inteiro:'))
        var n2 = Number.parseFloat(window.prompt('Digite um número flutuante:'))
        var n3 = Number(window.prompt('Digite qualquer tipo de número: '))
        var soma = n1 + n2 + n3
        window.alert(`A soma do número inteiro ${n1}, do número flutuante ${n2} e de um número qualquer ${n3}, é de ${soma}.`)
        
        /*
        Para converter em string é:
        String(&var)
        &var.toString()
        */
    </script>
</body>
</html>
